{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h2>📂 내 시간표 목록</h2>
        <p class="text-muted">수정할 기간을 선택해주세요.</p>
    </div>

    {% if schedules %}
        <div class="list-group shadow-sm">
            {% for sch in schedules %}
            <a href="{% url 'schedule_edit_loader' %}?start={{ sch.start }}&end={{ sch.end }}" 
               class="list-group-item list-group-item-action p-4 d-flex justify-content-between align-items-center">
                
                <div>
                    <h5 class="mb-1 fw-bold text-primary">{{ sch.title }}</h5>
                    <small class="text-muted">등록된 스케줄 수정하기</small>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="text-center py-5">
            <p class="text-muted">등록된 고정 스케줄이 없습니다.</p>
            <a href="{% url 'schedule_setup' %}" class="btn btn-outline-primary mt-2">
                새 시간표 만들기
            </a>
        </div>
    {% endif %}
    
    <div class="mt-4 text-center">
        <a href="{% url 'my_schedule' %}" class="text-decoration-none text-muted">
            <i class="bi bi-arrow-left"></i> 돌아가기
        </a>
    </div>
</div>
{% endblock %}
