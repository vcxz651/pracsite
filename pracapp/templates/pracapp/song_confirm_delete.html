{% extends 'base.html' %}
{% block content %}
<div class="alert alert-danger mt-5" role="alert">
    <h4 class="alert-heading">이 곡을 삭제하시겠습니까?</h4>
    <p>"<strong>{{ song.title }}</strong>" 곡을 영구 삭제합니다.</p>
    <hr>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">삭제</button>
        <a href="{% url 'meeting_detail' meeting_id %}" class="btn btn-outline-secondary">취소</a>
    </form>
</div>
{% endblock %}
