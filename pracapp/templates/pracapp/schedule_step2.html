{% extends 'base.html' %}

{% block content %}
<style>
    .no-select { user-select: none; -webkit-user-select: none; }

    .schedule-container {
        display: grid;
        /* [Time] + [일] [월] ... [토] (총 8개 열) */
        grid-template-columns: 60px repeat(7, 1fr);
        gap: 1px;
        background-color: #dee2e6;
        border: 1px solid #dee2e6;
        max-width: 1000px;
        margin: 0 auto;
        border-radius: 4px;
        overflow: hidden;
    }

    .header-cell {
        background-color: #f8f9fa;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 요일 색상 */
    .header-cell.sun { color: #e03131; } /* 일요일 빨강 */
    .header-cell.sat { color: #1971c2; } /* 토요일 파랑 */

    .time-label {
        background-color: #fff;
        color: #888;
        font-size: 0.8rem;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px dotted #eee;
    }

    .grid-cell {
        background-color: #fff;
        height: 40px; /* 클릭하기 편하게 높이 확보 */
        cursor: pointer;
        border-bottom: 1px dotted #f1f3f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: white;
        transition: 0.1s;
    }

    /* 드래그 및 선택 상태 스타일 */
    .grid-cell.selecting { background-color: #ffc9c9; } /* 드래그 중 (붉은색) */
    .grid-cell.erasing { opacity: 0.5; }                 /* 지우는 중 */

    .grid-cell.active {
        /* background-color: ...;  <- 삭제! */
        color: #333; /* 글자색 진하게 (파스텔 배경 위라 잘 보임) */
        font-weight: bold;
        border-color: white; /* 셀 구분선 */
        align-items: flex-start; /* 텍스트를 위쪽 정렬 */
        padding-top: 2px;
    }

    /* 하단 액션바 (디자인 통일) */
    .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        padding: 10px;
        background-color: #f8f9fa;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        max-width: 1000px;
        margin-left: auto; margin-right: auto;
    }

    /* 말풍선 */
    @keyframes bubbleFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #inputBubble {
        display: none; position: fixed; z-index: 9999;
        background: white; border: 1px solid #ccc;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        padding: 10px; border-radius: 8px; width: 220px;
        animation: bubbleFadeIn 0.2s ease-out;
    }

    /* 하루종일 버튼 스타일 */
    .btn-all-day {
        width: 100%;
        padding: 4px 0;
        font-size: 0.65rem; /* 글자 크기 줄임 */
        letter-spacing: -0.5px; /* 자간 좁힘 */
        white-space: nowrap; /* 줄바꿈 방지 */
        border: 1px dashed #ced4da;
        background-color: #fff;
        color: #adb5bd;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        font-weight: bold;
        margin-bottom: 5px;
    }
    .btn-all-day:hover { background-color: #ced4da; color: #fff; border-color: #ced4da; }
</style>

<div class="container mt-4 mb-5">
    <div class="text-center mb-4">
        <h2>🔄 고정 스케줄 입력</h2>
        <p class="text-muted">
            매주 반복되는 일정을 드래그하여 입력하세요.<br>
            (예: 수업, 알바, 정기 회의 등)
        </p>
    </div>

    <div class="schedule-container no-select" id="scheduleGrid">
        </div>

    <div class="action-bar">
        <button onclick="resetAll()" class="btn btn-outline-danger btn-sm">
            🗑️ 전체 초기화
        </button>
        <div class="d-flex align-items-center gap-2">
            <small class="text-muted">입력이 끝났나요?</small>
            <button onclick="saveSchedule()" class="btn btn-primary px-4">
                다음 단계로 (예외 일정)
            </button>
        </div>
    </div>
</div>

<div id="inputBubble">
    <input type="text" id="bubbleInput" class="form-control form-control-sm mb-2" placeholder="일정 이름 (예: 수업)">
    <div class="d-flex justify-content-end gap-1">
        <button class="btn btn-sm btn-secondary" onclick="closeBubble()">취소</button>
        <button class="btn btn-sm btn-primary" onclick="confirmBubble()">확인</button>
    </div>
</div>

<script>
    // --- 1. 설정 및 데이터 ---
    // [핵심] 화면 표시 순서: 일(6) -> 월(0) -> ... -> 토(5)
    // DB 인덱스 기준: 월=0, 화=1, ... 일=6
    const displayOrder = [0, 1, 2, 3, 4, 5, 6];
    const dayNames = ['월', '화', '수', '목', '금', '토', '일']; // displayOrder 순서에 맞는 이름

    const startHour = 9;
    const endHour = 24;
    const slotsPerHour = 2; // 30분 단위
    const totalSlots = (endHour - startHour) * slotsPerHour; // 30칸

    // 서버에서 가져온 기존 데이터 (있다면)
    const savedData = JSON.parse('{{ saved_data|escapejs }}');
    // savedData 구조: { "0": [{start:0, end:2, reason:"수업"}], ... } (키값은 DB인덱스)

    // 로컬 상태 관리 (Map: dayIdx -> Array of slots)
    // Map 구조: key=DB요일인덱스(0~6), value=Map(slotIdx -> reason)
    let scheduleMap = new Map();
    [0,1,2,3,4,5,6].forEach(d => scheduleMap.set(d, new Map()));

    // 초기 데이터 로드
    for (const [dayStr, blocks] of Object.entries(savedData)) {
        const dayIdx = parseInt(dayStr);
        const dayMap = scheduleMap.get(dayIdx);
        blocks.forEach(block => {
            for(let i=block.start; i<block.end; i++) {
                dayMap.set(i, block.reason);
            }
        });
    }

    // --- 2. 그리드 그리기 ---
    const grid = document.getElementById('scheduleGrid');

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        // HSL 색상 사용 (Hue: 문자열기반, Saturation: 70%, Lightness: 85% -> 파스텔톤)
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 85%)`;
    }

    // --- [수정] 그리드 그리기 (색상 적용 & 텍스트 맨 위만 표시) ---
    function renderGrid() {
        grid.innerHTML = '';

        // (1) 헤더 행 생성 (버튼 텍스트 변경)
        const timeHeader = document.createElement('div');
        timeHeader.className = 'header-cell';
        timeHeader.innerText = 'Time';
        grid.appendChild(timeHeader);

        displayOrder.forEach((dbDayIdx, i) => {
            const header = document.createElement('div');
            header.className = 'header-cell';
            if(dbDayIdx === 6) header.classList.add('sun');
            if(dbDayIdx === 5) header.classList.add('sat');

            header.innerHTML = `
                <div class="d-flex flex-column align-items-center w-100">
                    <span>${dayNames[i]}</span>
                    <button class="btn-all-day mt-1" onclick="selectAllDay(${dbDayIdx})">하루종일</button>
                </div>
            `;
            grid.appendChild(header);
        });

        // (2) 시간 슬롯 생성
        for (let i = 0; i < totalSlots; i++) {
            const realIdx = i + (startHour * slotsPerHour);

            const hour = Math.floor(realIdx / 2);
            const min = (realIdx % 2) === 0 ? '00' : '30';

            const timeLabel = document.createElement('div');
            timeLabel.className = 'time-label';
            timeLabel.innerText = `${hour}:${min}`;
            grid.appendChild(timeLabel);

            displayOrder.forEach(dayIdx => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.day = dayIdx;
                cell.dataset.time = realIdx;

                const dayMap = scheduleMap.get(dayIdx);
                const reason = dayMap.get(realIdx);

                if (reason) {
                    cell.classList.add('active');
                    // [NEW] 1. 동적 색상 적용
                    cell.style.backgroundColor = stringToColor(reason);

                    // [NEW] 2. 바로 윗 칸과 내용이 다를 때만 텍스트 표시 (맨 윗칸만 표시)
                    const prevReason = dayMap.get(realIdx - 1);
                    if (reason !== prevReason) {
                        cell.innerText = reason;
                    }
                }

                cell.addEventListener('mousedown', startDrag);
                cell.addEventListener('mouseenter', onMouseEnter);
                grid.appendChild(cell);
            });
        }
    }

    // --- 3. 드래그 로직 ---
    let isDragging = false;
    let dragStartDay = -1;
    let dragStartTime = -1;
    let dragMode = 'create'; // 'create' | 'erase'
    let selectedCells = [];

    function startDrag(e) {
        closeBubble();
        isDragging = true;
        dragStartDay = parseInt(this.dataset.day);
        dragStartTime = parseInt(this.dataset.time);
        selectedCells = [];

        // 이미 칠해진 곳을 클릭하면 지우개 모드
        if (this.classList.contains('active')) {
            dragMode = 'erase';
        } else {
            dragMode = 'create';
        }

        processCell(this);
    }

    function onMouseEnter(e) {
        if (!isDragging) return;
        // 다른 요일로 넘어가면 무시 (세로 드래그만 허용하거나, 자유롭게 하거나. 여기선 요일 일치 시만)
        if (parseInt(this.dataset.day) !== dragStartDay) return;

        processCell(this);
    }

    function processCell(cell) {
        const currentTime = parseInt(cell.dataset.time);

        // 범위 계산 (시작점 ~ 현재점)
        const min = Math.min(dragStartTime, currentTime);
        const max = Math.max(dragStartTime, currentTime);

        // 시각적 피드백 초기화 (현재 드래그 중인 요일의 모든 셀)
        document.querySelectorAll(`.grid-cell[data-day="${dragStartDay}"]`).forEach(c => {
            c.classList.remove('selecting', 'erasing');
        });
        selectedCells = [];

        // 범위 내 셀 선택
        for(let t=min; t<=max; t++) {
            const target = document.querySelector(`.grid-cell[data-day="${dragStartDay}"][data-time="${t}"]`);
            if(target) {
                if(dragMode === 'create' && !target.classList.contains('active')) {
                    target.classList.add('selecting');
                    selectedCells.push(target);
                } else if(dragMode === 'erase' && target.classList.contains('active')) {
                    target.classList.add('erasing');
                    selectedCells.push(target);
                }
            }
        }
    }

    document.addEventListener('mouseup', (e) => {
        if (!isDragging) return;
        isDragging = false;

        if (selectedCells.length > 0) {
            if (dragMode === 'create') {
                showBubble(e.clientX, e.clientY);
                // [중요] 말풍선 띄울 땐 선택영역(.selecting) 제거 안 함! (그대로 둠)
                return;
            } else {
                // 지우개 모드는 즉시 삭제 및 스타일 제거
                const dayMap = scheduleMap.get(dragStartDay);
                selectedCells.forEach(cell => {
                    const t = parseInt(cell.dataset.time);
                    dayMap.delete(t);
                    cell.classList.remove('active', 'erasing');
                    cell.style.backgroundColor = ''; // 색상 제거
                    cell.innerText = '';
                });
            }
        }
        // 드래그 잔여 스타일 제거 (지우개 모드거나 선택 없이 끝난 경우)
        document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('selecting', 'erasing'));
    });

    // --- 4. 하루종일 선택 ---
    // --- [수정] 하루종일 선택 (말풍선 위치 보정) ---
    function selectAllDay(dayIdx) {
        closeBubble();
        dragStartDay = dayIdx;
        dragMode = 'create';
        selectedCells = [];

        // 해당 요일의 비어있는 모든 셀 선택
        const dayMap = scheduleMap.get(dayIdx);
        for(let t=18; t<18+totalSlots; t++) { // 09:00 ~ 24:00
            if(!dayMap.has(t)) {
                const cell = document.querySelector(`.grid-cell[data-day="${dayIdx}"][data-time="${t}"]`);
                if(cell) {
                    cell.classList.add('selecting');
                    selectedCells.push(cell);
                }
            }
        }

        if(selectedCells.length > 0) {
            // [위치 보정 로직]
            // 전체 표의 중앙이 아니라, '해당 요일의 첫 번째 칸'을 기준으로 잡습니다.
            const firstCell = document.querySelector(`.grid-cell[data-day="${dayIdx}"]`);

            if (firstCell) {
                const rect = firstCell.getBoundingClientRect();

                // X축: 해당 열의 정중앙
                const targetX = rect.left + (rect.width / 2);

                // Y축: 첫 번째 칸보다 살짝 아래 (헤더 바로 밑)
                // 마우스 클릭 위치와 비슷하게 느껴지도록 상단에서 조금 띄움
                const targetY = rect.top + 50;

                showBubble(targetX, targetY);
            }
        }
    }

    // --- 5. 말풍선 & 데이터 처리 ---
    const bubble = document.getElementById('inputBubble');
    const bubbleInput = document.getElementById('bubbleInput');

    function showBubble(x, y) {
        bubble.style.display = 'block';
        let fx = x; let fy = y;
        if(x + 220 > window.innerWidth) fx = x - 220;
        if(y + 100 > window.innerHeight) fy = y - 100;
        bubble.style.left = fx + 'px';
        bubble.style.top = fy + 'px';
        bubbleInput.value = '';
        bubbleInput.focus();

        bubbleInput.onkeydown = (e) => {
            if(e.key === 'Enter') confirmBubble();
            if(e.key === 'Escape') closeBubble();
        }
    }

    function closeBubble() {
        bubble.style.display = 'none';

        // [NEW] 말풍선이 닫힐 때 비로소 붉은색 선택영역 제거
        selectedCells.forEach(c => c.classList.remove('selecting'));
        selectedCells = [];
    }

    // --- [수정] 확인 버튼 (색상 및 텍스트 적용 확인) ---
    function confirmBubble() {
        const reason = bubbleInput.value.trim();
        if(!reason) return;

        const dayMap = scheduleMap.get(dragStartDay);

        // 데이터 저장
        selectedCells.forEach(cell => {
            const t = parseInt(cell.dataset.time);
            dayMap.set(t, reason);
        });

        // 렌더링 다시 돌려서 텍스트 위치(맨 위)와 색상 갱신
        renderGrid();

        closeBubble(); // 여기서 selectedCells 초기화됨
    }

    function resetAll() {
        if(!confirm("모든 고정 스케줄을 삭제하시겠습니까?")) return;
        scheduleMap.forEach(map => map.clear());
        renderGrid();
    }

    // --- 6. 서버 저장 ---
    function saveSchedule() {
        // Map -> JSON 변환
        // 구조: { "0": [{start:18, end:20, reason:"수업"}, ...], "1": ... }
        const result = {};

        scheduleMap.forEach((dayMap, dayIdx) => {
            if(dayMap.size === 0) return;

            const blocks = [];
            let start = -1;
            let currReason = null;

            // 18(09:00)부터 순회하며 연속된 블록 찾기
            for(let t=18; t<18+totalSlots; t++) {
                const reason = dayMap.get(t);

                if(reason && start === -1) {
                    // 블록 시작
                    start = t;
                    currReason = reason;
                } else if ((!reason || reason !== currReason) && start !== -1) {
                    // 블록 끝 (비었거나 사유가 바뀜)
                    blocks.push({ start: start, end: t, reason: currReason });
                    start = -1;
                    if(reason) {
                        start = t;
                        currReason = reason;
                    }
                }
            }
            // 마지막 블록 처리
            if(start !== -1) {
                blocks.push({ start: start, end: 18+totalSlots, reason: currReason });
            }

            if(blocks.length > 0) {
                result[dayIdx] = blocks;
            }
        });

        // AJAX 전송
        fetch("{% url 'schedule_recurring' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(result)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                window.location.href = "{% url 'schedule_oneoff' %}";
            } else {
                alert('저장 중 오류가 발생했습니다.');
            }
        });
    }

    // 초기 실행
    renderGrid();

</script>
{% endblock %}
