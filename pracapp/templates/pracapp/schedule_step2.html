{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    .no-select { user-select: none; -webkit-user-select: none; }

    .schedule-container {
        display: grid;
        grid-template-columns: 60px repeat(7, 1fr);
        gap: 1px;
        background-color: #dee2e6;
        border: 1px solid #dee2e6;
        max-width: 1000px;
        margin: 0 auto;
        border-radius: 4px;
        overflow: hidden;
    }
    .schedule-grid-scroll {
        max-width: 1000px;
        margin: 0 auto;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .schedule-grid-scroll .schedule-container {
        margin: 0;
        max-width: none;
    }
    body.schedule-dragging {
        overflow: hidden;
        touch-action: none;
    }

    .header-cell {
        background-color: #f8f9fa;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .header-cell.sun { color: #e03131; }
    .header-cell.sat { color: #1971c2; }

    .time-label {
        background-color: #fff;
        color: #888;
        font-size: 0.8rem;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px dotted #eee;
    }

    .grid-cell {
        background-color: #fff;
        height: 40px;
        cursor: pointer;
        border-bottom: 1px dotted #f1f3f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        color: white;
        transition: 0.1s;
        touch-action: none;
    }
    #scheduleGrid,
    #specialScheduleGrid {
        touch-action: none;
    }

    .grid-cell.selecting { background-color: #ffc9c9; }
    .grid-cell.erasing { opacity: 0.5; }

    .grid-cell.active {
        color: #333;
        font-weight: bold;
        border-color: white;
        align-items: flex-start;
        padding-top: 2px;
    }

    .action-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        padding: 10px;
        background-color: #f8f9fa;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
    }

    @keyframes bubbleFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .input-bubble {
        display: none;
        position: fixed;
        z-index: 9999;
        background: white;
        border: 1px solid #ccc;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        padding: 10px;
        border-radius: 8px;
        width: 220px;
        animation: bubbleFadeIn 0.2s ease-out;
    }

    .btn-all-day {
        width: 100%;
        padding: 4px 0;
        font-size: 0.65rem;
        letter-spacing: -0.5px;
        white-space: nowrap;
        border: 1px dashed #ced4da;
        background-color: #fff;
        color: #adb5bd;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
        font-weight: bold;
        margin-bottom: 5px;
    }
    .btn-all-day:hover { background-color: #ced4da; color: #fff; border-color: #ced4da; }

    .special-period-section {
        max-width: 1000px;
        margin: 16px auto 0;
    }

    .special-period-card {
        border: 1px solid #dee2e6;
        border-radius: 10px;
        background: #fff;
        margin-bottom: 10px;
        overflow: hidden;
    }

    .special-period-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
    }

    .special-period-title {
        font-weight: 700;
        font-size: 0.92rem;
        color: #334155;
    }

    .special-period-actions {
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .special-toggle-btn {
        border: 1px solid #ced4da;
        background: #fff;
        border-radius: 999px;
        width: 28px;
        height: 28px;
        line-height: 1;
        font-weight: 700;
        color: #495057;
    }

    .special-period-body {
        display: none;
        padding: 10px;
        background: #fff;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .special-period-card.expanded .special-period-body {
        display: block;
    }

    .special-period-card.expanded .special-toggle-btn {
        transform: rotate(180deg);
    }

    .special-add-btn {
        width: 100%;
        border: 2px dashed #adb5bd;
        background: #fafbfc;
        color: #495057;
        border-radius: 10px;
        padding: 12px;
        font-weight: 700;
    }

    .special-editor-panel {
        display: none;
        margin-top: 10px;
        border: 1px solid #dee2e6;
        border-radius: 10px;
        background: #fff;
        padding: 12px;
    }

    .special-editor-panel.open {
        display: block;
    }

    .flatpickr-calendar {
        border-radius: 12px;
        border: 1px solid #e6ebf2;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.14);
    }

    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
        background: #ff9a3d;
        border-color: #ff9a3d;
    }
    @media (max-width: 768px) {
        .schedule-grid-scroll .schedule-container,
        .special-period-body .schedule-container {
            min-width: 760px;
        }
        .action-bar {
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
        }
        .action-bar .d-flex {
            justify-content: space-between;
            flex-wrap: wrap;
        }
    }
</style>

<div class="container mt-4 mb-5">
    <div class="text-center mb-4">
        <h2>STEP 1. 🔄 고정 스케줄 입력</h2>
        <p class="text-muted">
            매주 반복되는 일정을 드래그하여 입력하세요.<br>
            (예: 수업, 알바, 정기 회의 등)
        </p>
    </div>

    <div class="schedule-grid-scroll">
        <div class="schedule-container no-select" id="scheduleGrid"></div>
    </div>

    <div class="special-period-section">
        <div id="specialPeriodCards"></div>

        <div id="specialEditorPanel" class="special-editor-panel">
            <div class="row g-2 align-items-end mb-3">
                <div class="col-12 col-md-4">
                    <label class="form-label small mb-1">시작일</label>
                    <input type="text" class="form-control form-control-sm" id="specialStartDate" autocomplete="off">
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label small mb-1">종료일</label>
                    <input type="text" class="form-control form-control-sm" id="specialEndDate" autocomplete="off">
                </div>
                <div class="col-12 col-md-4 d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-primary" id="specialDoneBtn">완료</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="specialCancelBtn">취소</button>
                </div>
            </div>

            <div class="schedule-grid-scroll">
                <div class="schedule-container no-select" id="specialScheduleGrid"></div>
            </div>
        </div>

        <button type="button" id="addSpecialPeriodBtn" class="special-add-btn">
            + 특정 기간 고정 일정 추가
        </button>
    </div>

    <div class="action-bar">
        <button onclick="resetAll()" class="btn btn-outline-danger btn-sm">🗑️ 전체 초기화</button>
        <div class="d-flex align-items-center gap-2">
            <button onclick="saveSchedule()" class="btn btn-primary px-4">다음 단계로 (예외 일정)</button>
        </div>
    </div>
</div>

<div id="inputBubble" class="input-bubble">
    <input type="text" id="bubbleInput" class="form-control form-control-sm mb-2" placeholder="일정 이름 (예: 수업)">
    <div class="d-flex justify-content-end gap-1">
        <button class="btn btn-sm btn-secondary" onclick="closeBubble()">취소</button>
        <button class="btn btn-sm btn-primary" onclick="confirmBubble()">확인</button>
    </div>
</div>

<div id="specialInputBubble" class="input-bubble">
    <input type="text" id="specialBubbleInput" class="form-control form-control-sm mb-2" placeholder="일정 이름 (예: 집중 프로젝트)">
    <div class="d-flex justify-content-end gap-1">
        <button class="btn btn-sm btn-secondary" onclick="closeSpecialBubble()">취소</button>
        <button class="btn btn-sm btn-primary" onclick="confirmSpecialBubble()">확인</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const displayOrder = [0, 1, 2, 3, 4, 5, 6];
    const dayNames = ['월', '화', '수', '목', '금', '토', '일'];
    const startHour = 9;
    const endHour = 24;
    const slotsPerHour = 2;
    const totalSlots = (endHour - startHour) * slotsPerHour;

    const savedData = JSON.parse('{{ saved_data|escapejs }}');
    const savedAdditionalPeriods = JSON.parse('{{ saved_additional_periods|default:"[]"|escapejs }}');
    const scheduleStart = '{{ schedule_start }}';
    const scheduleEnd = '{{ schedule_end }}';

    let scheduleMap = new Map();
    [0,1,2,3,4,5,6].forEach(d => scheduleMap.set(d, new Map()));

    for (const [dayStr, blocks] of Object.entries(savedData)) {
        const dayIdx = parseInt(dayStr);
        const dayMap = scheduleMap.get(dayIdx);
        blocks.forEach(block => {
            for (let i = block.start; i < block.end; i++) dayMap.set(i, block.reason);
        });
    }

    let additionalPeriods = Array.isArray(savedAdditionalPeriods)
        ? savedAdditionalPeriods.map((p, idx) => ({...p, id: p.id || `saved-${idx}`}))
        : [];

    const grid = document.getElementById('scheduleGrid');
    const specialGrid = document.getElementById('specialScheduleGrid');
    const specialCardsWrap = document.getElementById('specialPeriodCards');
    const addSpecialBtn = document.getElementById('addSpecialPeriodBtn');
    const specialEditorPanel = document.getElementById('specialEditorPanel');
    const specialStartDate = document.getElementById('specialStartDate');
    const specialEndDate = document.getElementById('specialEndDate');
    const specialDoneBtn = document.getElementById('specialDoneBtn');
    const specialCancelBtn = document.getElementById('specialCancelBtn');

    const inputBubble = document.getElementById('inputBubble');
    const bubbleInput = document.getElementById('bubbleInput');
    const specialInputBubble = document.getElementById('specialInputBubble');
    const specialBubbleInput = document.getElementById('specialBubbleInput');

    let specialEditorMap = new Map();
    [0,1,2,3,4,5,6].forEach(d => specialEditorMap.set(d, new Map()));

    let startPicker = null;
    let endPicker = null;

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 85%)`;
    }

    function renderHeader(targetGrid, withAllDay, onAllDayClick) {
        const timeHeader = document.createElement('div');
        timeHeader.className = 'header-cell';
        timeHeader.innerText = 'Time';
        targetGrid.appendChild(timeHeader);

        displayOrder.forEach((dbDayIdx, i) => {
            const header = document.createElement('div');
            header.className = 'header-cell';
            if (dbDayIdx === 6) header.classList.add('sun');
            if (dbDayIdx === 5) header.classList.add('sat');

            if (withAllDay) {
                header.innerHTML = `<div class="d-flex flex-column align-items-center w-100"><span>${dayNames[i]}</span><button class="btn-all-day mt-1" data-day="${dbDayIdx}">하루종일</button></div>`;
                header.querySelector('button').addEventListener('click', () => onAllDayClick(dbDayIdx));
            } else {
                header.innerText = dayNames[i];
            }
            targetGrid.appendChild(header);
        });
    }

    function renderGridByMap(targetGrid, mapSource, bindEvents) {
        targetGrid.innerHTML = '';
        renderHeader(targetGrid, bindEvents, bindEvents ? selectAllDay : null);

        for (let i = 0; i < totalSlots; i++) {
            const realIdx = i + (startHour * slotsPerHour);
            const hour = Math.floor(realIdx / 2);
            const min = (realIdx % 2) === 0 ? '00' : '30';

            const timeLabel = document.createElement('div');
            timeLabel.className = 'time-label';
            timeLabel.innerText = `${hour}:${min}`;
            targetGrid.appendChild(timeLabel);

            displayOrder.forEach(dayIdx => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.day = dayIdx;
                cell.dataset.time = realIdx;

                const dayMap = mapSource.get(dayIdx);
                const reason = dayMap.get(realIdx);
                if (reason) {
                    cell.classList.add('active');
                    cell.style.backgroundColor = stringToColor(reason);
                    const prevReason = dayMap.get(realIdx - 1);
                    if (reason !== prevReason) cell.innerText = reason;
                }

                if (bindEvents) {
                    cell.addEventListener('pointerdown', startDrag);
                    cell.addEventListener('pointerenter', onMouseEnter);
                }
                targetGrid.appendChild(cell);
            });
        }
    }

    function renderMainGrid() {
        renderGridByMap(grid, scheduleMap, true);
    }

    function renderSpecialEditorGrid() {
        specialGrid.innerHTML = '';
        renderHeader(specialGrid, true, selectAllDaySpecial);

        for (let i = 0; i < totalSlots; i++) {
            const realIdx = i + (startHour * slotsPerHour);
            const hour = Math.floor(realIdx / 2);
            const min = (realIdx % 2) === 0 ? '00' : '30';

            const timeLabel = document.createElement('div');
            timeLabel.className = 'time-label';
            timeLabel.innerText = `${hour}:${min}`;
            specialGrid.appendChild(timeLabel);

            displayOrder.forEach(dayIdx => {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.day = dayIdx;
                cell.dataset.time = realIdx;

                const dayMap = specialEditorMap.get(dayIdx);
                const reason = dayMap.get(realIdx);
                if (reason) {
                    cell.classList.add('active');
                    cell.style.backgroundColor = stringToColor(reason);
                    const prevReason = dayMap.get(realIdx - 1);
                    if (reason !== prevReason) cell.innerText = reason;
                }

                cell.addEventListener('pointerdown', startSpecialDrag);
                cell.addEventListener('pointerenter', onSpecialMouseEnter);
                specialGrid.appendChild(cell);
            });
        }
    }

    function cloneMap(src) {
        const copied = new Map();
        src.forEach((dayMap, dayIdx) => copied.set(dayIdx, new Map(dayMap)));
        return copied;
    }

    function mapToBlocksObject(mapSource) {
        const result = {};
        mapSource.forEach((dayMap, dayIdx) => {
            if (dayMap.size === 0) return;
            const blocks = [];
            let start = -1;
            let currReason = null;

            for (let t = 18; t < 18 + totalSlots; t++) {
                const reason = dayMap.get(t);
                if (reason && start === -1) {
                    start = t;
                    currReason = reason;
                } else if ((!reason || reason !== currReason) && start !== -1) {
                    blocks.push({ start: start, end: t, reason: currReason });
                    start = -1;
                    if (reason) {
                        start = t;
                        currReason = reason;
                    }
                }
            }
            if (start !== -1) blocks.push({ start: start, end: 18 + totalSlots, reason: currReason });
            if (blocks.length > 0) result[String(dayIdx)] = blocks;
        });
        return result;
    }

    function openSpecialEditor() {
        specialEditorMap.forEach(map => map.clear());
        specialEditorPanel.classList.add('open');
        addSpecialBtn.disabled = true;
        renderSpecialEditorGrid();
    }

    function closeSpecialEditor() {
        specialEditorPanel.classList.remove('open');
        addSpecialBtn.disabled = false;
        closeSpecialBubble();
    }

    function formatPeriod(startStr, endStr) {
        const [sy, sm, sd] = startStr.split('-').map(Number);
        const [ey, em, ed] = endStr.split('-').map(Number);
        const sText = `${String(sy).slice(-2)}년 ${sm}월 ${sd}일`;
        if (sy === ey) return `${sText} ~ ${em}월 ${ed}일`;
        const eText = `${String(ey).slice(-2)}년 ${em}월 ${ed}일`;
        return `${sText} ~ ${eText}`;
    }

    function renderPreviewGrid(containerEl, periodData) {
        const tmpMap = new Map();
        [0,1,2,3,4,5,6].forEach(d => tmpMap.set(d, new Map()));
        Object.entries(periodData || {}).forEach(([dayStr, blocks]) => {
            const dayIdx = parseInt(dayStr);
            const dayMap = tmpMap.get(dayIdx);
            (blocks || []).forEach(block => {
                for (let i = block.start; i < block.end; i++) dayMap.set(i, block.reason);
            });
        });
        renderGridByMap(containerEl, tmpMap, false);
    }

    function toggleSpecialCard(id) {
        const idx = additionalPeriods.findIndex(p => p.id === id);
        if (idx < 0) return;
        additionalPeriods[idx].isExpanded = !additionalPeriods[idx].isExpanded;
        renderSpecialCards();
    }

    function removeSpecialCard(id) {
        additionalPeriods = additionalPeriods.filter(p => p.id !== id);
        renderSpecialCards();
    }

    function renderSpecialCards() {
        specialCardsWrap.innerHTML = '';

        additionalPeriods.forEach((period) => {
            const card = document.createElement('div');
            card.className = `special-period-card ${period.isExpanded ? 'expanded' : ''}`;

            const header = document.createElement('div');
            header.className = 'special-period-header';

            const title = document.createElement('div');
            title.className = 'special-period-title';
            title.innerText = formatPeriod(period.start_date, period.end_date);

            const actions = document.createElement('div');
            actions.className = 'special-period-actions';

            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'btn btn-sm btn-outline-danger';
            delBtn.innerText = '삭제';
            delBtn.addEventListener('click', () => removeSpecialCard(period.id));

            const toggleBtn = document.createElement('button');
            toggleBtn.type = 'button';
            toggleBtn.className = 'special-toggle-btn';
            toggleBtn.innerText = '⌄';
            toggleBtn.addEventListener('click', () => toggleSpecialCard(period.id));

            actions.appendChild(delBtn);
            actions.appendChild(toggleBtn);
            header.appendChild(title);
            header.appendChild(actions);

            const body = document.createElement('div');
            body.className = 'special-period-body';
            const previewGrid = document.createElement('div');
            previewGrid.className = 'schedule-container no-select';
            body.appendChild(previewGrid);

            card.appendChild(header);
            card.appendChild(body);
            specialCardsWrap.appendChild(card);

            if (period.isExpanded) {
                renderPreviewGrid(previewGrid, period.data || {});
            }
        });
    }

    addSpecialBtn.addEventListener('click', () => {
        openSpecialEditor();
    });

    specialDoneBtn.addEventListener('click', () => {
        if (!specialStartDate.value || !specialEndDate.value) {
            alert('기간 시작일/종료일을 선택해주세요.');
            return;
        }
        if (specialStartDate.value > specialEndDate.value) {
            alert('종료일은 시작일보다 빠를 수 없습니다.');
            return;
        }

        const periodData = mapToBlocksObject(specialEditorMap);
        if (Object.keys(periodData).length === 0) {
            alert('추가할 고정일정이 없습니다.');
            return;
        }

        additionalPeriods.push({
            id: `period-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
            start_date: specialStartDate.value,
            end_date: specialEndDate.value,
            data: periodData,
            isExpanded: false,
        });

        closeSpecialEditor();
        renderSpecialCards();
    });

    specialCancelBtn.addEventListener('click', () => {
        closeSpecialEditor();
    });

    startPicker = flatpickr(specialStartDate, {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'y년 n월 j일',
        disableMobile: true,
        minDate: scheduleStart,
        maxDate: scheduleEnd,
        defaultDate: scheduleStart,
        onChange: function(selectedDates, dateStr) {
            if (!endPicker) return;
            endPicker.set('minDate', dateStr || scheduleStart);
            if (specialEndDate.value && specialEndDate.value < specialStartDate.value) {
                endPicker.setDate(specialStartDate.value, true, 'Y-m-d');
            }
        }
    });

    endPicker = flatpickr(specialEndDate, {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'y년 n월 j일',
        disableMobile: true,
        minDate: scheduleStart,
        maxDate: scheduleEnd,
        defaultDate: scheduleEnd,
    });

    // --- Base Grid Drag ---
    let isDragging = false;
    let dragStartDay = -1;
    let dragStartTime = -1;
    let dragMode = 'create';
    let selectedCells = [];

    function startDrag(e) {
        if (e) e.preventDefault();
        closeBubble();
        isDragging = true;
        document.body.classList.add('schedule-dragging');
        dragStartDay = parseInt(this.dataset.day);
        dragStartTime = parseInt(this.dataset.time);
        selectedCells = [];
        dragMode = this.classList.contains('active') ? 'erase' : 'create';
        processCell(this);
    }

    function onMouseEnter(e) {
        if (e && (e.buttons === 0) && !isDragging) return;
        if (!isDragging) return;
        if (parseInt(this.dataset.day) !== dragStartDay) return;
        processCell(this);
    }

    function processCell(cell) {
        const currentTime = parseInt(cell.dataset.time);
        const min = Math.min(dragStartTime, currentTime);
        const max = Math.max(dragStartTime, currentTime);
        document.querySelectorAll(`#scheduleGrid .grid-cell[data-day="${dragStartDay}"]`).forEach(c => c.classList.remove('selecting', 'erasing'));
        selectedCells = [];

        for (let t = min; t <= max; t++) {
            const target = document.querySelector(`#scheduleGrid .grid-cell[data-day="${dragStartDay}"][data-time="${t}"]`);
            if (!target) continue;
            if (dragMode === 'create' && !target.classList.contains('active')) {
                target.classList.add('selecting');
                selectedCells.push(target);
            } else if (dragMode === 'erase' && target.classList.contains('active')) {
                target.classList.add('erasing');
                selectedCells.push(target);
            }
        }
    }

    function finishMainDrag(clientX, clientY) {
        if (!isDragging) return;
        isDragging = false;
        document.body.classList.remove('schedule-dragging');

        if (selectedCells.length > 0) {
            if (dragMode === 'create') {
                showBubble(clientX, clientY);
                return;
            }
            const dayMap = scheduleMap.get(dragStartDay);
            selectedCells.forEach(cell => {
                const t = parseInt(cell.dataset.time);
                dayMap.delete(t);
                cell.classList.remove('active', 'erasing');
                cell.style.backgroundColor = '';
                cell.innerText = '';
            });
        }
        document.querySelectorAll('#scheduleGrid .grid-cell').forEach(c => c.classList.remove('selecting', 'erasing'));
    }

    document.addEventListener('mouseup', (e) => {
        finishMainDrag(e.clientX, e.clientY);
    });
    document.addEventListener('pointerup', (e) => {
        finishMainDrag(e.clientX, e.clientY);
    });

    function selectAllDay(dayIdx) {
        closeBubble();
        dragStartDay = dayIdx;
        dragMode = 'create';
        selectedCells = [];

        const dayMap = scheduleMap.get(dayIdx);
        for (let t = 18; t < 18 + totalSlots; t++) {
            if (!dayMap.has(t)) {
                const cell = document.querySelector(`#scheduleGrid .grid-cell[data-day="${dayIdx}"][data-time="${t}"]`);
                if (cell) {
                    cell.classList.add('selecting');
                    selectedCells.push(cell);
                }
            }
        }

        if (selectedCells.length > 0) {
            const firstCell = document.querySelector(`#scheduleGrid .grid-cell[data-day="${dayIdx}"]`);
            if (firstCell) {
                const rect = firstCell.getBoundingClientRect();
                showBubble(rect.left + (rect.width / 2), rect.top + 50);
            }
        }
    }

    function showBubble(x, y) {
        inputBubble.style.display = 'block';
        let fx = x, fy = y;
        if (x + 220 > window.innerWidth) fx = x - 220;
        if (y + 100 > window.innerHeight) fy = y - 100;
        inputBubble.style.left = fx + 'px';
        inputBubble.style.top = fy + 'px';
        bubbleInput.value = '';
        bubbleInput.focus();
    }

    function closeBubble() {
        inputBubble.style.display = 'none';
        selectedCells.forEach(c => c.classList.remove('selecting'));
        selectedCells = [];
    }

    function confirmBubble() {
        const reason = bubbleInput.value.trim();
        if (!reason) return;
        const dayMap = scheduleMap.get(dragStartDay);
        selectedCells.forEach(cell => {
            const t = parseInt(cell.dataset.time);
            dayMap.set(t, reason);
        });
        renderMainGrid();
        closeBubble();
    }

    // --- Special Editor Drag ---
    let specialDragging = false;
    let specialDragStartDay = -1;
    let specialDragStartTime = -1;
    let specialDragMode = 'create';
    let specialSelectedCells = [];

    function startSpecialDrag(e) {
        if (e) e.preventDefault();
        closeSpecialBubble();
        specialDragging = true;
        document.body.classList.add('schedule-dragging');
        specialDragStartDay = parseInt(this.dataset.day);
        specialDragStartTime = parseInt(this.dataset.time);
        specialSelectedCells = [];
        specialDragMode = this.classList.contains('active') ? 'erase' : 'create';
        processSpecialCell(this);
    }

    function onSpecialMouseEnter(e) {
        if (e && (e.buttons === 0) && !specialDragging) return;
        if (!specialDragging) return;
        if (parseInt(this.dataset.day) !== specialDragStartDay) return;
        processSpecialCell(this);
    }

    function processSpecialCell(cell) {
        const currentTime = parseInt(cell.dataset.time);
        const min = Math.min(specialDragStartTime, currentTime);
        const max = Math.max(specialDragStartTime, currentTime);
        document.querySelectorAll(`#specialScheduleGrid .grid-cell[data-day="${specialDragStartDay}"]`).forEach(c => c.classList.remove('selecting', 'erasing'));
        specialSelectedCells = [];

        for (let t = min; t <= max; t++) {
            const target = document.querySelector(`#specialScheduleGrid .grid-cell[data-day="${specialDragStartDay}"][data-time="${t}"]`);
            if (!target) continue;
            if (specialDragMode === 'create' && !target.classList.contains('active')) {
                target.classList.add('selecting');
                specialSelectedCells.push(target);
            } else if (specialDragMode === 'erase' && target.classList.contains('active')) {
                target.classList.add('erasing');
                specialSelectedCells.push(target);
            }
        }
    }

    function finishSpecialDrag(clientX, clientY) {
        if (!specialDragging) return;
        specialDragging = false;
        document.body.classList.remove('schedule-dragging');

        if (specialSelectedCells.length > 0) {
            if (specialDragMode === 'create') {
                showSpecialBubble(clientX, clientY);
                return;
            }
            const dayMap = specialEditorMap.get(specialDragStartDay);
            specialSelectedCells.forEach(cell => {
                const t = parseInt(cell.dataset.time);
                dayMap.delete(t);
                cell.classList.remove('active', 'erasing');
                cell.style.backgroundColor = '';
                cell.innerText = '';
            });
            renderSpecialEditorGrid();
        }
        document.querySelectorAll('#specialScheduleGrid .grid-cell').forEach(c => c.classList.remove('selecting', 'erasing'));
    }

    document.addEventListener('mouseup', (e) => {
        finishSpecialDrag(e.clientX, e.clientY);
    });
    document.addEventListener('pointerup', (e) => {
        finishSpecialDrag(e.clientX, e.clientY);
    });

    // iOS Safari 등 터치 환경에서 스크롤 대신 드래그 선택이 우선되도록 보강
    document.addEventListener('touchstart', (e) => {
        const cell = e.target.closest('#scheduleGrid .grid-cell');
        if (cell) {
            e.preventDefault();
            startDrag.call(cell, e);
            return;
        }
        const specialCell = e.target.closest('#specialScheduleGrid .grid-cell');
        if (specialCell) {
            e.preventDefault();
            startSpecialDrag.call(specialCell, e);
        }
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
        if (isDragging) {
            e.preventDefault();
            const t = (e.touches && e.touches[0]) ? e.touches[0] : null;
            if (!t) return;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            const cell = el && el.closest ? el.closest('#scheduleGrid .grid-cell') : null;
            if (cell && parseInt(cell.dataset.day) === dragStartDay) {
                processCell(cell);
            }
            return;
        }
        if (specialDragging) {
            e.preventDefault();
            const t = (e.touches && e.touches[0]) ? e.touches[0] : null;
            if (!t) return;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            const cell = el && el.closest ? el.closest('#specialScheduleGrid .grid-cell') : null;
            if (cell && parseInt(cell.dataset.day) === specialDragStartDay) {
                processSpecialCell(cell);
            }
        }
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
        const t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
        const x = t ? t.clientX : 0;
        const y = t ? t.clientY : 0;
        finishMainDrag(x, y);
        finishSpecialDrag(x, y);
    }, { passive: true });

    function selectAllDaySpecial(dayIdx) {
        closeSpecialBubble();
        specialDragStartDay = dayIdx;
        specialDragMode = 'create';
        specialSelectedCells = [];

        const dayMap = specialEditorMap.get(dayIdx);
        for (let t = 18; t < 18 + totalSlots; t++) {
            if (!dayMap.has(t)) {
                const cell = document.querySelector(`#specialScheduleGrid .grid-cell[data-day="${dayIdx}"][data-time="${t}"]`);
                if (cell) {
                    cell.classList.add('selecting');
                    specialSelectedCells.push(cell);
                }
            }
        }

        if (specialSelectedCells.length > 0) {
            const firstCell = document.querySelector(`#specialScheduleGrid .grid-cell[data-day="${dayIdx}"]`);
            if (firstCell) {
                const rect = firstCell.getBoundingClientRect();
                showSpecialBubble(rect.left + (rect.width / 2), rect.top + 50);
            }
        }
    }

    function showSpecialBubble(x, y) {
        specialInputBubble.style.display = 'block';
        let fx = x, fy = y;
        if (x + 220 > window.innerWidth) fx = x - 220;
        if (y + 100 > window.innerHeight) fy = y - 100;
        specialInputBubble.style.left = fx + 'px';
        specialInputBubble.style.top = fy + 'px';
        specialBubbleInput.value = '';
        specialBubbleInput.focus();
    }

    function closeSpecialBubble() {
        specialInputBubble.style.display = 'none';
        specialSelectedCells.forEach(c => c.classList.remove('selecting'));
        specialSelectedCells = [];
    }

    function confirmSpecialBubble() {
        const reason = specialBubbleInput.value.trim();
        if (!reason) return;
        const dayMap = specialEditorMap.get(specialDragStartDay);
        specialSelectedCells.forEach(cell => {
            const t = parseInt(cell.dataset.time);
            dayMap.set(t, reason);
        });
        renderSpecialEditorGrid();
        closeSpecialBubble();
    }

    function resetAll() {
        if (!confirm('모든 고정 스케줄과 특수 기간 고정 스케줄을 삭제하시겠습니까?')) return;
        scheduleMap.forEach(map => map.clear());
        additionalPeriods = [];
        renderMainGrid();
        renderSpecialCards();
        closeSpecialEditor();
    }

    function saveSchedule() {
        if (specialEditorPanel.classList.contains('open')) {
            alert('특수 기간 고정 일정 추가를 완료하거나 취소한 뒤 저장해주세요.');
            return;
        }

        const payload = {
            base: mapToBlocksObject(scheduleMap),
            additional_periods: additionalPeriods.map((p) => ({
                start_date: p.start_date,
                end_date: p.end_date,
                data: p.data,
            })),
        };

        fetch("{% url 'schedule_recurring' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                window.location.href = "{% url 'schedule_oneoff' %}";
            } else {
                alert('저장 중 오류가 발생했습니다.');
            }
        });
    }

    renderMainGrid();
    renderSpecialCards();
</script>
{% endblock %}
