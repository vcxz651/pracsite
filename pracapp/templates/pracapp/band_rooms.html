{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>🎸 {{ band.name }} 합주실 관리</h2>

    <div class="list-group mb-4">
        {% for room in rooms %}
        <div class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-1">{{ room.name }}</h5>
                <small class="text-muted">최대 {{ room.capacity }}명 | {{ room.location }}</small>
            </div>
        </div>
        {% empty %}
        <p class="text-muted p-3">등록된 합주실이 없습니다.</p>
        {% endfor %}
    </div>

    <div class="card p-3">
        <h4>새 합주실 등록</h4>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">등록</button>
        </form>
    </div>

    <div class="mt-3">
        <a href="{% url 'dashboard' %}?band_id={{ band.id }}" class="btn btn-secondary">대시보드로 돌아가기</a>
    </div>
</div>
{% endblock %}
