{% load static %}
<style>
  body.tutorial-scroll-locked {
    overflow: hidden;
    touch-action: none;
  }
  #tutorial-choice-modal {
    position: fixed;
    inset: 0;
    z-index: 8998;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.48);
  }
  #tutorial-choice-modal.is-open {
    display: flex;
  }
  .tutorial-choice-card {
    width: min(420px, 92vw);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 54px rgba(15, 23, 42, 0.22);
    padding: 20px 18px;
  }
  .tutorial-choice-title {
    font-size: 1rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 6px;
  }
  .tutorial-choice-desc {
    font-size: 0.9rem;
    line-height: 1.5;
    color: #475569;
    margin-bottom: 14px;
  }
  .tutorial-choice-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .tutorial-choice-actions .btn {
    border-radius: 999px;
    font-weight: 700;
  }
  #tutorial-overlay {
    position: fixed;
    z-index: 9000;
    pointer-events: none;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.62);
    display: none;
    transition: all 0.2s ease;
  }
  #tutorial-tooltip {
    position: fixed;
    z-index: 9001;
    max-width: 320px;
    border-radius: 10px;
    background: #fff;
    box-shadow: 0 10px 26px rgba(0, 0, 0, 0.2);
    padding: 12px;
    display: none;
  }
  #tutorial-tooltip .tour-title {
    font-weight: 700;
    margin-bottom: 4px;
  }
  #tutorial-tooltip .tour-desc {
    font-size: 0.92rem;
    color: #4b5563;
    margin-bottom: 10px;
  }
  #tutorial-tooltip .tour-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  #tutorial-tooltip .tour-actions .btn {
    border-radius: 999px;
  }
</style>

<div id="tutorial-choice-modal" aria-hidden="true">
  <div class="tutorial-choice-card" role="dialog" aria-live="polite" aria-modal="true" aria-labelledby="tutorialChoiceTitle">
    <div class="tutorial-choice-title" id="tutorialChoiceTitle">어떻게 둘러볼까요?</div>
    <div class="tutorial-choice-desc">바로 만져보거나, 핵심 기능 설명부터 볼 수 있습니다.</div>
    <div class="tutorial-choice-actions">
      <button type="button" id="tutorialChoiceFreeBtn" class="btn btn-sm btn-outline-secondary">자유롭게 구경</button>
      <button type="button" id="tutorialChoiceStartBtn" class="btn btn-sm btn-primary">기능 튜토리얼 시작</button>
    </div>
  </div>
</div>

<div id="tutorial-overlay" aria-hidden="true"></div>
<div id="tutorial-tooltip" role="dialog" aria-live="polite">
  <div class="tour-title" id="tourTitle"></div>
  <div class="tour-desc" id="tourDesc"></div>
  <div class="tour-actions">
    <small id="tourProgress" class="text-muted">1 / 1</small>
    <div class="d-flex gap-2">
      <button type="button" id="tourSkipBtn" class="btn btn-sm btn-outline-secondary">건너뛰기</button>
      <button type="button" id="tourNextBtn" class="btn btn-sm btn-primary">다음</button>
    </div>
  </div>
</div>

<script src="{% static 'pracapp/js/tutorial_demo.js' %}"></script>
