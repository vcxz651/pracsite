{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    .setup-shell {
        max-width: 680px;
    }
    .setup-card {
        border: 1px solid #eceff3;
        border-radius: 18px;
        background: linear-gradient(165deg, #ffffff 0%, #f7faff 100%);
        box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
    }
    .setup-title {
        font-weight: 800;
        letter-spacing: -0.01em;
    }
    .trendy-label {
        font-size: 0.86rem;
        font-weight: 700;
        color: #334155;
        margin-bottom: 0.45rem;
    }
    .trendy-date,
    .trendy-select {
        height: 48px;
        border-radius: 12px;
        border: 1.5px solid #dbe2ea;
        background-color: #fbfdff;
        font-weight: 600;
        transition: all 0.2s ease;
    }
    .trendy-date:focus,
    .trendy-select:focus {
        border-color: #ff9a3d;
        box-shadow: 0 0 0 4px rgba(255, 154, 61, 0.18);
        background-color: #fff;
    }
    .flatpickr-calendar {
        border-radius: 14px;
        border: 1px solid #e6ebf2;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
    }
    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
        background: #ff9a3d;
        border-color: #ff9a3d;
    }
</style>
<div class="container mt-5 setup-shell">
    <div class="text-center mb-4">
        <h2 class="setup-title">📅 스케줄링 기간 설정</h2>
        <p class="text-muted">일정을 등록할 기간을 설정해주세요.</p>
    </div>

    <form method="post" id="setupForm">
        {% csrf_token %}
        <div class="card p-4 setup-card">

            <div class="mb-4">
                <label class="form-label trendy-label">기간 지정</label>
                <select class="form-select trendy-select" id="presetSelect" name="preset_code" aria-label="학사일정 프리셋 선택"></select>
            </div>

            <div class="row g-3 mb-4" id="customDateRangeWrap">
                <div class="col-12 col-md-6">
                    <label class="form-label trendy-label">시작일</label>
                    <input type="text" name="start_date" class="form-control trendy-date" required id="startDate" autocomplete="off">
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label trendy-label">종료일</label>
                    <input type="text" name="end_date" class="form-control trendy-date" required id="endDate" autocomplete="off">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                다음 단계로 (고정 스케줄 입력)
            </button>
        </div>
    </form>
</div>

<div class="modal fade" id="conflictModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger bg-opacity-10">
                <h5 class="modal-title fw-bold text-danger">⚠️ 생성 불가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="conflictMessage" class="fw-bold text-dark mb-3"></p>
                <p class="small text-muted mb-0">
                    * 기간 중 일부 구간에만 추가 고정 일정이 필요하다면,
                    기존 일정 수정에서 <b>'특수 기간 고정 일정 추가'</b> 기능을 이용해주세요.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">확인</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="confirmDateModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">📅 기간 설정 확인</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-1">설정 기간</p>
                <h4 class="fw-bold text-primary mb-3" id="periodCheckText"></h4>

                <div class="alert alert-warning d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                    <div>
                        <strong>주의!</strong><br>
                        생성 후에는 <b>스케줄 내용</b>은 수정할 수 있지만,<br>
                        <u>기간(날짜)은 변경할 수 없습니다.</u>
                    </div>
                </div>
                <p class="text-muted small mb-0 text-center">이대로 진행하시겠습니까?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">아니요 (다시 설정)</button>
                <button type="button" class="btn btn-primary px-4 fw-bold" onclick="finalSubmit()">
                    네, 진행합니다
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const presets = JSON.parse('{{ period_presets_json|escapejs }}');
        const defaultPresetCode = '{{ default_preset_code|default:"CUSTOM" }}';
        const presetSelect = document.getElementById('presetSelect');
        const startInput = document.getElementById('startDate');
        const endInput = document.getElementById('endDate');
        const form = document.getElementById('setupForm');
        let startPicker = null;
        let endPicker = null;

        // 모달 인스턴스
        const conflictModal = new bootstrap.Modal(document.getElementById('conflictModal'));
        const confirmDateModal = new bootstrap.Modal(document.getElementById('confirmDateModal'));
        const customDateRangeWrap = document.getElementById('customDateRangeWrap');

        function syncEndMinDate() {
            if (!endPicker || !startInput.value) return;
            endPicker.set('minDate', startInput.value);
            if (endInput.value && endInput.value < startInput.value) {
                endPicker.setDate(startInput.value, true, 'Y-m-d');
            }
        }

        function applyPreset(presetCode) {
            const preset = presets.find((item) => item.code === presetCode);
            if (!preset) return;
            customDateRangeWrap.style.display = preset.code === 'CUSTOM' ? '' : 'none';
            if (startPicker && endPicker) {
                startPicker.setDate(preset.start, true, 'Y-m-d');
                endPicker.setDate(preset.end, true, 'Y-m-d');
                syncEndMinDate();
                return;
            }
            startInput.value = preset.start;
            endInput.value = preset.end;
        }

        function formatKoreanPeriod(startStr, endStr) {
            const [sy, sm, sd] = startStr.split('-').map(Number);
            const [ey, em, ed] = endStr.split('-').map(Number);
            const shortStartYear = String(sy).slice(-2);
            const shortEndYear = String(ey).slice(-2);

            const startText = `${shortStartYear}년 ${sm}월 ${sd}일`;
            if (sy === ey) {
                return `${startText} ~ ${em}월 ${ed}일`;
            }
            const endText = `${shortEndYear}년 ${em}월 ${ed}일`;
            return `${startText} ~ ${endText}`;
        }

        function buildConfirmPeriodText(startValue, endValue) {
            const selectedCode = presetSelect.value;
            if (selectedCode !== 'CUSTOM') {
                const selectedPreset = presets.find((item) => item.code === selectedCode);
                if (!selectedPreset) return formatKoreanPeriod(startValue, endValue);
                return `${selectedPreset.label} (${formatKoreanPeriod(selectedPreset.start, selectedPreset.end)})`;
            }
            return formatKoreanPeriod(startValue, endValue);
        }

        presets.forEach((preset) => {
            const option = document.createElement('option');
            option.value = preset.code;
            option.textContent = preset.code === 'CUSTOM'
                ? preset.label
                : `${preset.label} (${formatKoreanPeriod(preset.start, preset.end)})`;
            presetSelect.appendChild(option);
        });

        startPicker = flatpickr(startInput, {
            dateFormat: 'Y-m-d',
            altInput: true,
            altFormat: 'y년 n월 j일',
            disableMobile: true,
            onChange: function() {
                syncEndMinDate();
            }
        });

        endPicker = flatpickr(endInput, {
            dateFormat: 'Y-m-d',
            altInput: true,
            altFormat: 'y년 n월 j일',
            disableMobile: true,
        });

        presetSelect.value = defaultPresetCode;
        applyPreset(presetSelect.value);

        presetSelect.addEventListener('change', () => {
            applyPreset(presetSelect.value);
        });

        // 폼 제출 가로채기
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const s = startInput.value;
            const eDate = endInput.value;

            // 1. 서버에 중복 체크 요청
            fetch(`{% url 'schedule_setup' %}?start=${s}&end=${eDate}`, {
                method: 'GET',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'conflict') {
                    // [경우 A] 중복 발생 -> Conflict 모달 띄움 (생성 차단)
                    document.getElementById('conflictMessage').innerHTML = data.message;
                    conflictModal.show();
                } else if (data.status === 'ok') {
                    // [경우 B] 중복 없음 -> 확인 사살 모달 띄움
                    document.getElementById('periodCheckText').innerText = buildConfirmPeriodText(s, eDate);
                    confirmDateModal.show();
                } else {
                    alert(data.message || '기간 확인 중 오류가 발생했습니다.');
                }
            });
        });

        // 최종 제출 함수 (모달 속 '네' 버튼)
        window.finalSubmit = function() {
            form.submit();
        }
    });
</script>
{% endblock %}
